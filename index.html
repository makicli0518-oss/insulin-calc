<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#3b82f6">
  <title>インスリンボーラス計算ツール</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root{--btn:#3b82f6;--btn-hover:#2563eb;--panel:#fff;--panel-shadow:rgba(0,0,0,.08);--bg:#f8fafc;--text:#1e293b;--muted:#94a3b8;--input-bg:#fff7ed;--axis:#94a3b8;--grid:#e2e8f0;--accent:#1e40af;--marker:#dc2626}
    *{box-sizing:border-box}
    body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);margin:0;padding:16px}
    .container{max-width:820px;margin:0 auto}
    h1{font-size:1.4rem;margin:0 0 8px}
    section{background:var(--panel);border-radius:12px;padding:14px;margin-top:14px;box-shadow:0 2px 6px var(--panel-shadow)}
    label{font-size:.9rem;font-weight:600;color:#1e3a8a;display:block;margin-bottom:4px}
    input,select,button{width:100%;padding:8px 10px;border:1px solid var(--muted);border-radius:8px;font-size:14px}
    input[type=number]{background-color:var(--input-bg)}
    button{background:var(--btn);color:#fff;border:none;cursor:pointer;margin-top:10px}
    button:hover{background:var(--btn-hover)}
    .grid{display:grid;gap:10px}
    .grid-3{grid-template-columns:repeat(3,minmax(0,1fr))}
    @media(max-width:640px){.grid-3{grid-template-columns:1fr}}
    .result{background:#eff6ff;border:2px solid #93c5fd;border-radius:10px;padding:10px;margin-top:6px;text-align:center;font-size:1.1rem;font-weight:700;color:#1e40af}
    .note{font-size:.8rem;color:#2563eb;margin-top:4px}
    #settingsPanel,#iobChartPanel{display:none}
    .fixed-top{position:sticky;top:0;background:var(--bg);z-index:10;padding-bottom:6px}
    .chart-wrap{margin-top:10px;border:1px solid var(--grid);border-radius:10px;padding:8px;background:#fff}
    .legend{font-size:.8rem;color:#334155;display:flex;gap:10px;flex-wrap:wrap;margin-top:4px}
    .dot{width:10px;height:10px;border-radius:50%;display:inline-block;background:var(--accent)}
    .dot-marker{background:var(--marker)}
    .muted{color:#64748b;font-size:.75rem}
  </style>
</head>
<body>
  <div class="container">
    <div class="fixed-top">
      <h1>インスリンボーラス計算ツール</h1>
      <button onclick="tg('settingsPanel')">⚙ 設定を開く／閉じる</button>
    </div>

    <section id="settingsPanel">
      <h2>設定</h2>
      <div class="grid grid-3">
        <div><label>朝 ICR</label><input type="number" id="icrBreakfast" value="10"></div>
        <div><label>昼 ICR</label><input type="number" id="icrLunch" value="10"></div>
        <div><label>夕 ICR</label><input type="number" id="icrDinner" value="10"></div>
      </div>
      <div class="grid grid-3" style="margin-top:10px">
        <div><label>インスリン効果値 (ISF)</label><input type="number" id="isf" value="50"></div>
        <div><label>目標血糖 (mg/dL)</label><input type="number" id="target" value="120"></div>
        <div><label>注射ペンの単位刻み</label>
          <select id="rounding"><option value="0.5">0.5</option><option value="1">1.0</option><option value="0.1">0.1</option></select>
        </div>
      </div>
      <button id="resetSettings">設定リセット</button>
    </section>

    <section>
      <h2>食前入力（毎回入力）</h2>
      <label>食事時間帯（自動判定＋手動変更可）</label>
      <select id="meal">
        <option value="breakfast">朝（0〜11時）</option>
        <option value="lunch">昼（11〜17時）</option>
        <option value="dinner">夕（17〜24時）</option>
      </select>
      <p class="note">※ 現在時刻に基づいて自動設定されますが、必要に応じて変更可能です。</p>

      <div class="grid grid-3" style="margin-top:10px">
        <div><label>炭水化物量 (g)</label><input type="number" id="carbs" value="100"></div>
        <div><label>食前血糖 (mg/dL)</label><input type="number" id="bg" value="240"></div>
      </div>

      <div class="grid grid-3" style="margin-top:10px">
        <div>
          <label>使用インスリン</label>
          <select id="insulinType">
            <option value="lumjev">ルムジェブ（2.5h）</option>
            <option value="fiasp">フィアスプ（3.5h）</option>
            <option value="apidra">アピドラ・グルリジン（3h）</option>
            <option value="humalog">ヒューマログ、リスプロ（4h）</option>
            <option value="novorapid">ノボラピッド、アスパルト（5h）</option>
            <option value="regular">ノボリンR（6.5h）</option>
          </select>
        </div>
        <div><label>前回投与量 (U)</label><input type="number" id="prevDose" value="10"></div>
        <div><label>経過時間 (h)</label><input type="number" step="0.1" id="elapsed" value="2"></div>
      </div>

      <p class="note">💡 残存インスリン（IOB）は、R製剤以外なら4時間以上経過で入力不要です。</p>
      <p class="note" id="iobResult">推定残存インスリン：0.00 U（Walshモデル）</p>
    </section>

    <section>
      <h2>結果</h2>
      <div id="result-details"></div>
      <div class="result" id="result-total">推奨投与量：0.00 U</div>
    </section>

    <section>
      <button onclick="tg('iobChartPanel')">📉 残存インスリン曲線（Walshモデル）を開く／閉じる</button>
      <div id="iobChartPanel">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px">
          <h3 style="margin:0">残存インスリン曲線（Walshモデル）</h3>
          <div>
            <label><input type="radio" name="yScale" value="unit" checked> 単位（U）</label>
            <label><input type="radio" name="yScale" value="pct"> ％表示</label>
          </div>
        </div>
        <div class="chart-wrap">
          <canvas id="iobCanvas" style="width:100%;height:200px"></canvas>
          <div class="legend">
            <span><span class="dot"></span> 残存インスリン曲線</span>
            <span><span class="dot dot-marker"></span> 現在</span>
            <span class="muted" id="legendText"></span>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script>
    const K = "insulinCalcSettings_v7";
    const E = (id) => document.getElementById(id);
    const tg = (id) => {
      const p = E(id);
      p.style.display = (!p.style.display || p.style.display === "none") ? "block" : "none";
      if (id === "iobChartPanel" && p.style.display === "block") {
        setTimeout(()=>{ calc(); p.scrollIntoView({behavior:'smooth', block:'start'}); }, 150);
      }
    };
    const fmt = (v) => Number(v.toFixed(2));
    const getDur = (t) => ({lumjev:2.5, fiasp:3.5, apidra:3, humalog:4, novorapid:5, regular:6.5}[t] || 4);

    function calcIOB(dose, t, d){
      if(t >= d) return 0;
      const x = t/d;
      return dose * (1 - (3*x**2 - 2*x**3));
    }
    function getMealByTime(){
      const h = new Date().getHours();
      return h < 11 ? 'breakfast' : (h < 17 ? 'lunch' : 'dinner');
    }
    function loadSettings(){
      const s = JSON.parse(localStorage.getItem(K) || "{}");
      for(const k in s){ const el = E(k); if(el) el.value = s[k]; }
      E('meal').value = getMealByTime();
    }
    function saveSettings(){
      const keys=['icrBreakfast','icrLunch','icrDinner','isf','target','rounding','insulinType','prevDose','elapsed'];
      const d={}; keys.forEach(k=>{ const el=E(k); if(el) d[k]=el.value; });
      localStorage.setItem(K, JSON.stringify(d));
    }
    E('resetSettings').addEventListener('click',()=>{
      localStorage.removeItem(K);
      alert('設定をリセットしました。');
      location.reload();
    });

    function calc(){
      saveSettings();
      const b=+E('icrBreakfast').value||0, l=+E('icrLunch').value||0, dn=+E('icrDinner').value||0;
      const isf=+E('isf').value||0, target=+E('target').value||0, round=+E('rounding').value||0.5;
      const meal=E('meal').value, carbs=+E('carbs').value||0, bg=+E('bg').value||0;
      const prev=+E('prevDose').value||0, elap=+E('elapsed').value||0, insType=E('insulinType').value;
      const dur = getDur(insType);

      const iob = calcIOB(prev, elap, dur);
      E('iobResult').textContent = `推定残存インスリン：${fmt(iob)} U（Walshモデル）`;

      const icr = meal==='breakfast'? b : (meal==='lunch'? l : dn);
      const carbB = icr>0 ? carbs/icr : 0;
      const corrB = isf>0 ? (bg - target)/isf : 0;
      const total = Math.max(0, carbB + corrB - iob);
      const rounded = round>0 ? Math.round(total/round)*round : total;

      E('result-details').innerHTML =
        `炭水化物ボーラス：${fmt(carbB)} U<br>補正ボーラス：${fmt(corrB)} U<br>残存インスリン差し引き：-${fmt(iob)} U`;
      E('result-total').textContent = `推奨投与量：${fmt(rounded)} U`;

      drawIOBChart(prev, dur, elap);
    }

    const canvas = E('iobCanvas');
    const ctx = canvas.getContext('2d');

    function resizeCanvas(){
      const dpr = Math.max(window.devicePixelRatio||1,1);
      const rect = canvas.getBoundingClientRect();
      const w = rect.width || canvas.parentElement.clientWidth || 600;
      const h = rect.height || 200;
      canvas.width = Math.floor(w*dpr);
      canvas.height = Math.floor(h*dpr);
      ctx.setTransform(dpr,0,0,dpr,0,0);
    }

    function drawIOBChart(dose, dur, elapsed){
      resizeCanvas();
      const w = canvas.clientWidth;
      const h = canvas.clientHeight;
      const pL=40, pR=16, pT=16, pB=26;
      const yMode = (document.querySelector('input[name="yScale"]:checked')||{value:'unit'}).value;
      const maxY = (yMode==='pct') ? 100 : Math.max((dose>0?dose:1), 1);
      const xToPx = t => pL + ((w - pL - pR) * (t / dur));
      const yToPx = v => h - pB - ((h - pT - pB) * (v / maxY));

      ctx.clearRect(0,0,w,h);
      ctx.fillStyle="#fff"; ctx.fillRect(0,0,w,h);

      // grid
      ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--grid') || '#e2e8f0';
      ctx.beginPath();
      const hourStep = Math.max(1, Math.round(dur/6));
      for(let th=0; th<=dur; th+=hourStep){
        const x = xToPx(th); ctx.moveTo(x,pT); ctx.lineTo(x,h-pB);
      }
      [0,.25,.5,.75,1].forEach(f=>{ const y=yToPx(maxY*f); ctx.moveTo(pL,y); ctx.lineTo(w-pR,y); });
      ctx.stroke();

      // axes
      ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--axis') || '#94a3b8';
      ctx.beginPath(); ctx.moveTo(pL,pT); ctx.lineTo(pL,h-pB); ctx.lineTo(w-pR,h-pB); ctx.stroke();

      // labels
      ctx.fillStyle="#334155"; ctx.font="12px system-ui"; ctx.textAlign="center";
      for(let th=0; th<=dur; th+=hourStep) ctx.fillText(th.toString(), xToPx(th), h-6);
      ctx.save(); ctx.translate(10,(h-pB+pT)/2); ctx.rotate(-Math.PI/2);
      ctx.fillText(yMode==='pct'?'残存[%]':'残存[U]',0,0); ctx.restore();
      ctx.fillText('時間[h]', w-70, h-6);

      // curve
      ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--accent') || '#1e40af';
      ctx.beginPath();
      let first=true, steps=Math.max(120, Math.floor(dur*60));
      for(let i=0;i<=steps;i++){
        const t = dur*(i/steps);
        const x = t/dur;
        const frac = (x>=1)?0:(1 - (3*x*x - 2*x*x*x));
        const val = (yMode==='pct') ? frac*100 : dose*frac;
        const px = xToPx(t), py = yToPx(val);
        if(first){ ctx.moveTo(px,py); first=false; } else { ctx.lineTo(px,py); }
      }
      ctx.stroke();

      // marker
      const clamped = Math.min(Math.max(elapsed,0), dur);
      const xe = clamped/dur;
      const fr = (xe>=1)?0:(1 - (3*xe*xe - 2*xe*xe*xe));
      const valE = (yMode==='pct') ? fr*100 : dose*fr;
      const mx = xToPx(clamped), my = yToPx(valE);
      ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--marker') || '#dc2626';
      ctx.setLineDash([4,4]); ctx.beginPath(); ctx.moveTo(mx,pT); ctx.lineTo(mx,h-pB); ctx.stroke(); ctx.setLineDash([]);
      ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--marker') || '#dc2626';
      ctx.beginPath(); ctx.arc(mx,my,3,0,Math.PI*2); ctx.fill();
      E('legendText').textContent = `用量: ${dose} U / 作用時間: ${dur.toFixed(1)} h / 現在: ${clamped.toFixed(2)} h`;
    }

    document.querySelectorAll('input,select').forEach(e=>{ e.addEventListener('input',calc); e.addEventListener('change',calc); });
    document.querySelectorAll('input[name="yScale"]').forEach(e=> e.addEventListener('change',calc) );
    window.addEventListener('resize', ()=>{ clearTimeout(window._r); window._r = setTimeout(calc,150); } );

    // init
    loadSettings(); calc();

    // PWA register
    if('serviceWorker' in navigator){
      window.addEventListener('load', ()=>{ navigator.serviceWorker.register('service-worker.js'); });
    }
  </script>
</body>
</html>
